name: Anonymize pusher
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  anonymize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check and rewrite commit with bot identity
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          # Only rewrite if last commit is not already from the bot
          AUTHOR=$(git log -1 --format='%ae')
          if [ "$AUTHOR" != "41898282+github-actions[bot]@users.noreply.github.com" ]; then
            git commit --amend --no-edit --reset-author
            git push --force origin main
            echo "Commit rewritten with bot identity"
          else
            echo "Already anonymized, skipping"
          fi
